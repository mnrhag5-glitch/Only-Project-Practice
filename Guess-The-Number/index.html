<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background-color: #222;
  color: white;
}

.wrapper {
  margin-top: 50px;
}

input {
  padding: 10px;
  font-size: 16px;
}

button {
  padding: 10px 15px;
  cursor: pointer;
}

.button {
  margin-top: 20px;
  cursor: pointer;
  color: yellow;
}
</style>


  <div class="wrapper">
    <h1>Number Guessing Game</h1>
    <p>Guess a number between 1 and 50</p>

    <form>
      <input type="number" class="guessField" />
      <button class="guessSubmit">Submit Guess</button>
    </form>

    <div class="resultParas">
      <p>Previous guesses: <span class="guesses"></span></p>
      <p>Guesses remaining: <span class="lastResult">7</span></p>
      <p class="lowOrHi"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
    

    <script src = "app.js"></script>
</body>
</html>
